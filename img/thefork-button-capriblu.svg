        <g transform="translate(0 54)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,54 0,54" class="navy"/><polygon points="54,0 54,54 0,0" class="blue"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(0 108)"><rect width="54" height="54" class="navy"/><polygon points="0,0 54,12 54,24 0,12" fill="#ffffff"/><polygon points="0,24 54,36 54,48 0,36" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
      </g>

