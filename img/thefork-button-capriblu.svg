<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Book with TheFork">
  <defs>
    <filter id="softGlow" x="-10%" y="-25%" width="120%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset dy="3" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.35 0 0 0 0 0.75 0 0 0 0.35 0" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="buttonClip">
      <rect x="25" y="25" width="850" height="250" rx="34" ry="34"/>
    </clipPath>
    <linearGradient id="ceramic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#fffefa"/>
      <stop offset="1" stop-color="#f5fbff"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f91d0"/>
      <stop offset="1" stop-color="#0a2a66"/>
    </linearGradient>
    <style>
      .navy{fill:#0a2a66}.blue{fill:#1f6ab6}.sky{fill:#3497d4}.green{fill:#43a72d}.text{font-family:Arial,Helvetica,sans-serif}.title{font-size:45px;font-weight:800;letter-spacing:1px}.body{font-size:29px}.small{font-size:22px}.bold{font-weight:800}.tileLine{stroke:#ffffff;stroke-width:2.4;opacity:.95}.divider{stroke:#2b75bb;stroke-width:2;opacity:.75}
    </style>
  </defs>

  <rect width="900" height="300" fill="none"/>

  <g filter="url(#softGlow)">
    <rect x="25" y="25" width="850" height="250" rx="34" ry="34" fill="#ffffff"/>
    <g clip-path="url(#buttonClip)">
      <rect x="25" y="25" width="850" height="250" rx="34" ry="34" fill="url(#ceramic)"/>

      <!-- top tile border -->
      <g transform="translate(42 42)">
        <g>
          <rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="sky"/><polygon points="0,0 0,54 27,27" class="navy"/><polygon points="54,54 54,0 27,27" class="blue"/><polygon points="0,54 54,54 27,27" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/>
        </g>
        <g transform="translate(54 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 54,54" class="navy"/><polygon points="0,0 0,54 54,54" class="blue"/><polygon points="0,54 54,54 27,27" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(108 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,54 0,54" class="sky"/><polygon points="54,0 54,54 0,0" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(162 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="blue"/><polygon points="54,0 54,54 0,54" class="navy"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(216 0)"><rect width="54" height="54" class="navy"/><polygon points="0,0 54,12 54,24 0,12" fill="#ffffff"/><polygon points="0,24 54,36 54,48 0,36" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(270 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="blue"/><polygon points="0,0 0,54 27,27" class="sky"/><polygon points="54,54 54,0 27,27" class="navy"/><polygon points="0,54 54,54 27,27" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
