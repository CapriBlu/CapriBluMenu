        <g transform="translate(378 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="sky"/><polygon points="54,0 54,54 0,54" class="navy"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(432 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="blue"/><polygon points="0,54 54,54 27,27" class="sky"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(486 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,54 0,54" class="navy"/><polygon points="54,0 54,54 0,0" class="blue"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(540 0)"><rect width="54" height="54" class="navy"/><polygon points="0,0 54,12 54,24 0,12" fill="#ffffff"/><polygon points="0,24 54,36 54,48 0,36" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(594 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="blue"/><polygon points="54,0 54,54 0,54" class="sky"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
      </g>
    </g>

    <rect x="25" y="25" width="850" height="250" rx="34" ry="34" fill="none" stroke="#ffffff" stroke-width="12" opacity=".95"/>
    <rect x="36" y="36" width="828" height="228" rx="25" ry="25" fill="none" stroke="#0a4fa2" stroke-width="4"/>
    <rect x="125" y="78" width="650" height="144" rx="8" ry="8" fill="rgba(255,255,255,.92)" stroke="#1e66b1" stroke-width="2"/>

    <!-- TheFork simplified mark -->
    <g transform="translate(187 79)">
      <circle cx="70" cy="61" r="50" fill="#49a82f"/>
      <rect x="66" y="18" width="9" height="98" rx="4.5" fill="#ffffff"/>
      <rect x="44" y="12" width="7" height="38" rx="3.5" fill="#ffffff"/>
      <rect x="59" y="10" width="7" height="40" rx="3.5" fill="#ffffff"/>
      <rect x="74" y="10" width="7" height="40" rx="3.5" fill="#ffffff"/>
      <rect x="89" y="12" width="7" height="38" rx="3.5" fill="#ffffff"/>
      <path d="M68 112 C30 96 30 30 62 18 C51 50 52 86 68 112Z" fill="#ffffff" opacity=".95"/>
      <text x="70" y="152" text-anchor="middle" class="text bold" font-size="54" fill="#1f7f22">thefork</text>
      <text x="70" y="178" text-anchor="middle" class="text small" fill="#1b1b1b">a Tripadvisor company</text>
    </g>

    <line x1="392" y1="72" x2="392" y2="228" class="divider"/>
    <text x="607" y="107" text-anchor="middle" class="text title navy">BOOK WITH THEFORK</text>
    <path d="M578 133 C588 125, 598 141, 608 133 S628 141, 638 133" fill="none" stroke="#2389d2" stroke-width="5" stroke-linecap="round"/>
    <text x="607" y="166" text-anchor="middle" class="text body navy">Did you enjoy your visit?</text>
    <text x="607" y="197" text-anchor="middle" class="text body navy">Book your next table with us</text>
    <text x="607" y="229" text-anchor="middle" class="text body navy">on <tspan fill="#2f9d31">TheFork</tspan> and get <tspan class="bold">20% off.</tspan></text>
  </g>
