        <g transform="translate(378 0)"><rect width="54" height="54" class="navy"/><polygon points="0,0 54,12 54,24 0,12" fill="#ffffff"/><polygon points="0,24 54,36 54,48 0,36" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(432 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="blue"/><polygon points="54,0 54,54 0,54" class="sky"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(486 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="sky"/><polygon points="0,0 0,54 27,27" class="navy"/><polygon points="54,54 54,0 27,27" class="blue"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(540 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,54 0,54" class="navy"/><polygon points="54,0 54,54 0,0" class="blue"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(594 0)"><rect width="54" height="54" class="navy"/><polygon points="0,0 54,12 54,24 0,12" fill="#ffffff"/><polygon points="0,24 54,36 54,48 0,36" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(648 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="sky"/><polygon points="54,0 54,54 0,54" class="navy"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(702 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="blue"/><polygon points="0,0 0,54 27,27" class="navy"/><polygon points="54,54 54,0 27,27" class="sky"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(756 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 54,54" class="navy"/><polygon points="0,0 0,54 54,54" class="blue"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
      </g>

      <!-- side borders as simple tile strips -->
      <g transform="translate(42 96)">
        <rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="blue"/><polygon points="0,54 54,54 27,27" class="sky"/><rect width="54" height="54" fill="none" class="tileLine"/>
        <g transform="translate(0 54)"><rect width="54" height="54" class="navy"/><polygon points="0,0 54,12 54,24 0,12" fill="#ffffff"/><polygon points="0,24 54,36 54,48 0,36" fill="#ffffff"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(0 108)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="sky"/><polygon points="54,0 54,54 0,54" class="navy"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
