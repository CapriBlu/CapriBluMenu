        <g transform="translate(216 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 0,54" class="blue"/><polygon points="54,0 54,54 0,54" class="navy"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
        <g transform="translate(270 0)"><rect width="54" height="54" fill="#fff"/><polygon points="0,0 54,0 27,27" class="sky"/><polygon points="0,54 54,54 27,27" class="navy"/><rect width="54" height="54" fill="none" class="tileLine"/></g>
