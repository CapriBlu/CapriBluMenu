<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Capri Blu Sorrento</title>

  <link rel="stylesheet" href="./style.css?v=32">
  <link rel="icon" type="image/png" href="./img/Logo-Capri-Blu-Def.png">
</head>

<body>

  <main class="card">

    <a href="https://www.instagram.com/capri_blu_sorrento?igsh=OXZmdnk3YjYydGEx"
       target="_blank"
       class="logo-link">

      <img src="./img/Logo-Capri-Blu-Def.png"
           alt="Capri Blu Sorrento"
           class="logo">

    </a>

    <p class="subtitle">
      Your menu download is ready
    </p>

    <div class="buttons">

      <a class="image-button" href="./pdf/menu-it-eng.pdf" download>
        <img src="./img/bottone-food.png" alt="Food Menu">
      </a>

      <a class="image-button" href="./pdf/drink-menu.pdf" download>
        <img src="./img/drink-menu.png" alt="Drink Menu">
      </a>

      <a class="image-button small-button"
         href="https://www.google.com/search?q=capri+blu+sorrento"
         target="_blank">

        <img src="./img/pulsante-google.png" alt="Leave a Review on Google">
      </a>

    </div>

  </main>

</body>

</html>
