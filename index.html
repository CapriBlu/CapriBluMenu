<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capri Blu Sorrento</title>

  <link rel="icon" type="image/png" href="./img/Logo-Capri-Blu-Def.png">
  <link rel="stylesheet" href="./style.css?v=62">
</head>

<body>

  <video class="bg-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
    <source src="./img/Video.Sito.capri.Blu_compressed.mp4" type="video/mp4">
  </video>
  <div class="video-overlay" aria-hidden="true"></div>

  <main class="card">

    <img src="./img/pasta-lovers1.png" class="corner-left" alt="">
    <img src="./img/pasta-lovers1.png" class="corner-right" alt="">

    <a
      class="logo-link"
      href="https://www.instagram.com/capri_blu_sorrento?igsh=OXZmdnk3YjYydGEx"
      target="_blank"
      rel="noopener noreferrer"
    >
      <img
        class="logo"
        src="./img/Logo-Capri-Blu-Def.png"
        alt="Capri Blu Sorrento"
      >
    </a>

    <p class="subtitle">
      Your menu download is ready
    </p>

    <div class="buttons">

      <a class="image-button food-button" href="./pdf/menu-it-eng.pdf" download>
        <img src="./img/bottone-food.png" alt="Food Menu">
      </a>

      <a class="image-button drink-button" href="./pdf/drink-menu.pdf" download>
        <img src="./img/drink-menu.png" alt="Drink Menu">
      </a>

      <a class="image-button gallery-button" href="./galleria.html">
        <img src="./img/bottone-foto.png" alt="Foto Gallery">
      </a>

      <a
        class="image-button thefork-button"
        href="https://www.thefork.it/ristorante/capri-blu-sorrento-r861548"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="./img/thefork-button-capriblu.svg?v=3" alt="Book with TheFork">
      </a>

      <a
        class="image-button google-button"
        href="https://www.google.com/search?q=capri+blu+sorrento"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="./img/pulsante-google-capriblu.svg?v=3" alt="Leave a Review on Google">
      </a>

    </div>

  </main>

</body>
</html>
