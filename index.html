<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capri Blu Sorrento</title>

  <link rel="icon" type="image/png" href="./img/Logo-Capri-Blu-Def.png">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <main class="card">

    <!-- Pasta Lovers negli angoli -->
    <img src="./img/pasta-lovers1.png" class="corner-left" alt="">
    <img src="./img/pasta-lovers1.png" class="corner-right" alt="">

    <a
      class="logo-link"
      href="https://www.instagram.com/capri_blu_sorrento?igsh=OXZmdnk3YjYydGEx"
      target="_blank"
      rel="noopener noreferrer"
    >
      <img
        class="logo"
        src="./img/logo.jpg"
        alt="Capri Blu Sorrento"
      >
    </a>

    <p class="subtitle">
      Your menu download is ready
    </p>

    <div class="buttons">

      <a
        class="image-button food-button"
        href="./pdf/menu-it-eng.pdf"
        download
      >
        <img
          src="./img/bottone-food.png"
          alt="Food Menu"
        >
      </a>

      <a
        class="image-button drink-button"
        href="./pdf/drink-menu.pdf"
        download
      >
        <img
          src="./img/drink-menu.png"
          alt="Drink Menu"
        >
      </a>

      <a
        class="image-button google-button"
        href="https://www.google.com/search?q=capri+blu+sorrento"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="./img/pulsante-google.png"
          alt="Leave a Review on Google"
        >
      </a>

    </div>

  </main>

</body>
</html>
